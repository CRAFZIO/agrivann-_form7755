<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrivaan - Farmer List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <button class="sidebar-toggler" id="sidebarToggle">
        <i class="fas fa-bars"></i>
    </button>
    
    <nav id="sidebar">
        <div class="sidebar-header">
            <h4 class="fw-bold m-0"><i class="fas fa-sprout me-2"></i>Agrivaan</h4>
        </div>
        <div class="mt-4">
            <a href="dashboard.html" class="sidebar-link"><i class="fas fa-tachometer-alt me-3"></i>Dashboard</a>
            <a href="farmers.html" class="sidebar-link active"><i class="fas fa-users me-3"></i>Farmers List</a>
            <a href="questions.html" class="sidebar-link"><i class="fas fa-question-circle me-3"></i>Survey Questions</a>
            <a href="analytics.html" class="sidebar-link"><i class="fas fa-chart-pie me-3"></i>Analytics</a>
            <a href="settings.html" class="sidebar-link"><i class="fas fa-cog me-3"></i>Settings</a>
            <a href="#" class="sidebar-link mt-5" id="logoutBtn"><i class="fas fa-sign-out-alt me-3"></i>Logout</a>
        </div>
        <div class="sidebar-footer mt-auto">
            <div class="text-white-50 small">
                <i class="fas fa-shield-alt me-2"></i> Agrivaan Admin v2.0
            </div>
        </div>
    </nav>

    <div id="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Farmers Management</h2>
            <button class="btn btn-primary-agri" onclick="exportSurveyData()"><i class="fas fa-download me-2"></i>Export All Survey Data</button>
        </div>

        <div class="glass-card p-4 mb-4">
            <h6 class="fw-bold mb-3">Filters</h6>
            <form id="filterForm" class="row g-3">
                <div class="col-md-3">
                    <input type="text" id="filterDistrict" class="form-control" placeholder="Filter by District">
                </div>
                <div class="col-md-3">
                    <input type="text" id="filterTaluk" class="form-control" placeholder="Filter by Taluk">
                </div>
                <div class="col-md-3">
                    <select id="filterGender" class="form-select">
                        <option value="">All Genders</option>
                        <option value="ಗಂಡು">ಗಂಡು</option>
                        <option value="ಹೆಣ್ಣು">ಹೆಣ್ಣು</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button type="button" class="btn btn-success w-100" onclick="loadFarmers()">Apply Filters</button>
                </div>
            </form>
        </div>

        <div class="glass-card p-4">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Full Name</th>
                            <th>Mobile</th>
                            <th>District</th>
                            <th>Taluk</th>
                            <th>Joined Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="farmersTableBody">
                        <!-- Data injected here -->
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination -->
            <nav class="mt-4">
                <ul class="pagination justify-content-center" id="pagination">
                </ul>
            </nav>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/admin.js"></script>
    <script>
        let currentPage = 1;

        async function loadFarmers(page = 1) {
            currentPage = page;
            const district = document.getElementById('filterDistrict').value;
            const taluk = document.getElementById('filterTaluk').value;
            const gender = document.getElementById('filterGender').value;


            try {
                const res = await axiosInstance.get(`/farmers?page=${page}&district=${district}&taluk=${taluk}&gender=${gender}`);
                const { farmers, total, pages } = res.data;

                const body = document.getElementById('farmersTableBody');
                body.innerHTML = '';
                farmers.forEach(f => {
                    body.innerHTML += `
                        <tr>
                            <td data-label="ID">#${f.id}</td>
                            <td data-label="Full Name" class="fw-bold">${f.full_name}</td>
                            <td data-label="Mobile">${f.mobile_number}</td>
                            <td data-label="District">${f.district}</td>
                            <td data-label="Taluk">${f.taluk}</td>
                            <td data-label="Joined Date">${new Date(f.created_at).toLocaleDateString()}</td>
                            <td data-label="Actions">
                                <a href="farmer-view.html?id=${f.id}" class="btn btn-sm btn-outline-success me-1"><i class="fas fa-eye"></i></a>
                                <button onclick="deleteFarmer(${f.id})" class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                });

                renderPagination(pages, page);
            } catch (error) {
                handleAuthError(error);
            }
        }

        function renderPagination(totalPages, activePage) {
            const container = document.getElementById('pagination');
            container.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                container.innerHTML += `
                    <li class="page-item ${i === activePage ? 'active' : ''}">
                        <a class="page-link" href="#" onclick="loadFarmers(${i})">${i}</a>
                    </li>
                `;
            }
        }

        async function deleteFarmer(id) {
            if (confirm('Are you sure you want to delete this record?')) {
                try {
                    await axiosInstance.delete(`/farmers/${id}`);
                    loadFarmers(currentPage);
                } catch (error) {
                    alert('Delete failed');
                }
            }
        }

        async function exportSurveyData() {
            try {
                const exportBtn = document.querySelector('button[onclick="exportSurveyData()"]');
                const originalText = exportBtn.innerHTML;
                exportBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Exporting...';
                exportBtn.disabled = true;

                let allFarmers = [];
                let page = 1;
                let totalPages = 1;
                
                // Fetch all pages
                do {
                    const res = await axiosInstance.get(`/farmers?page=${page}`);
                    const { farmers, pages } = res.data;
                    if(farmers) {
                        allFarmers = allFarmers.concat(farmers);
                    }
                    totalPages = pages || 1;
                    page++;
                } while (page <= totalPages);

                if (allFarmers.length === 0) {
                    alert('No data found to export');
                    exportBtn.innerHTML = originalText;
                    exportBtn.disabled = false;
                    return;
                }

                let fullFarmersData = [];
                for (let i = 0; i < allFarmers.length; i++) {
                    exportBtn.innerHTML = `<i class="fas fa-spinner fa-spin me-2"></i>Fetching ${i+1}/${allFarmers.length}`;
                    
                    if (allFarmers[i].uses_smartphone !== undefined) {
                         fullFarmersData.push(allFarmers[i]);
                    } else {
                         const detailRes = await axiosInstance.get(`/farmers/${allFarmers[i].id}`);
                         fullFarmersData.push(detailRes.data.farmer);
                    }
                }

                let exportData = fullFarmersData.map(farmer => {
                    let row = {};
                    for (const [key, value] of Object.entries(farmer)) {
                        if (key !== 'dynamic_responses' && key !== 'id') {
                            row[key] = value;
                        }
                    }
                    if (farmer.dynamic_responses && farmer.dynamic_responses.length > 0) {
                        farmer.dynamic_responses.forEach(dr => {
                            row[dr.question] = dr.answer;
                        });
                    }
                    return row;
                });

                const worksheet = XLSX.utils.json_to_sheet(exportData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "All Survey Data");
                
                XLSX.writeFile(workbook, `Agrivaan_All_SurveyData_${new Date().toISOString().slice(0,10)}.xlsx`);

                exportBtn.innerHTML = originalText;
                exportBtn.disabled = false;
            } catch (error) {
                console.error(error);
                alert('Survey export failed. Please try again.');
                const exportBtn = document.querySelector('button[onclick="exportSurveyData()"]');
                if(exportBtn) {
                    exportBtn.innerHTML = '<i class="fas fa-download me-2"></i>Export All Survey Data';
                    exportBtn.disabled = false;
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => loadFarmers());
    </script>
</body>
</html>
