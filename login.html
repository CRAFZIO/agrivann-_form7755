<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrivaan - Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="login-page">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="login-card fade-in-up">
                    <div class="text-center mb-4">
                        <i class="fas fa-sprout fa-3x text-success mb-3"></i>
                        <h2 class="fw-bold text-gradient">Agrivaan Admin</h2>
                        <p class="text-muted">Enter credentials to manage surveys</p>
                    </div>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                                <input type="email" id="email" class="form-control border-start-0" required placeholder="Enter ur email">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0"><i class="fas fa-lock text-muted"></i></span>
                                <input type="password" id="password" class="form-control border-start-0 border-end-0" required placeholder="••••••••">
                                <button class="btn border border-start-0 bg-transparent text-muted" type="button" id="togglePassword" style="border-radius: 0 0.375rem 0.375rem 0;">
                                    <i class="fas fa-eye" id="toggleIcon"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary-agri w-100 py-3">Login Securely</button>
                    </form>
                    <div class="mt-4 text-center">
                        <a href="index.html" class="text-decoration-none text-success">← Back to Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        document.getElementById('togglePassword').addEventListener('click', function () {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await axios.post(`${CONFIG.API_BASE}/auth/login`, { email, password });
                localStorage.setItem('agrivaan_token', response.data.access_token);
                localStorage.setItem('admin_email', response.data.admin.email);
                window.location.href = 'dashboard.html';
            } catch (error) {
                alert('Login failed: ' + (error.response?.data?.msg || 'Invalid credentials'));
            }
        });
    </script>
</body>
</html>
