<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrivaan - Survey Questions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <button class="sidebar-toggler" id="sidebarToggle">
        <i class="fas fa-bars"></i>
    </button>
    
    <nav id="sidebar">
        <div class="sidebar-header">
            <h4 class="fw-bold m-0"><i class="fas fa-sprout me-2"></i>Agrivaan</h4>
        </div>
        <div class="mt-4">
            <a href="dashboard.html" class="sidebar-link"><i class="fas fa-tachometer-alt me-3"></i>Dashboard</a>
            <a href="farmers.html" class="sidebar-link"><i class="fas fa-users me-3"></i>Farmers List</a>
            <a href="questions.html" class="sidebar-link active"><i class="fas fa-question-circle me-3"></i>Survey Questions</a>
            <a href="analytics.html" class="sidebar-link"><i class="fas fa-chart-pie me-3"></i>Analytics</a>
            <a href="settings.html" class="sidebar-link"><i class="fas fa-cog me-3"></i>Settings</a>
            <a href="#" class="sidebar-link mt-5" id="logoutBtn"><i class="fas fa-sign-out-alt me-3"></i>Logout</a>
        </div>
        <div class="sidebar-footer mt-auto">
            <div class="text-white-50 small">
                <i class="fas fa-shield-alt me-2"></i> Agrivaan Admin v2.0
            </div>
        </div>
    </nav>

    <div id="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Survey Question Management</h2>
            <button class="btn btn-primary-agri" data-bs-toggle="modal" data-bs-target="#questionModal">
                <i class="fas fa-plus me-2"></i>Add New Question
            </button>
        </div>

        <div class="alert alert-success">
            <i class="fas fa-info-circle me-2"></i>Manage all survey questions here. "Core" questions are linked to the main database columns.
        </div>

        <div class="glass-card p-4">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Order</th>
                            <th>Section</th>
                            <th>Question (Kannada)</th>
                            <th>Type</th>
                            <th>Required</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="questionsTableBody">
                        <!-- Data injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Question Modal -->
    <div class="modal fade" id="questionModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content glass-card">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold" id="modalTitle">Add New Question</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="questionForm">
                        <input type="hidden" id="questionId">
                        <input type="hidden" id="questionSection">
                        <div class="mb-3">
                            <label class="form-label">Question Text (Kannada) *</label>
                            <input type="text" id="labelKn" class="form-control" required placeholder="ಉದಾ: ನಿಮ್ಮ ಫೋನ್ ನಂಬರ್ ಏನು?">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Field Name (Unique, Latin characters) *</label>
                            <input type="text" id="fieldName" class="form-control" required placeholder="e.g. phone_number">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Question Type</label>
                            <select id="fieldType" class="form-select">
                                <option value="text">Text Input</option>
                                <option value="number">Number Input</option>
                                <option value="select">Dropdown (Select)</option>
                                <option value="radio">Radio Buttons</option>
                            </select>
                        </div>
                        <div id="optionsDiv" class="mb-3 d-none">
                            <label class="form-label">Options (Comma separated)</label>
                            <textarea id="fieldOptions" class="form-control" placeholder="Yes, No, Maybe"></textarea>
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="isRequired" checked>
                            <label class="form-check-label">Required Field</label>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Display Order</label>
                            <input type="number" id="orderIndex" class="form-control" value="0">
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success" onclick="saveQuestion()">Save Question</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/questions.js"></script>
</body>
</html>
