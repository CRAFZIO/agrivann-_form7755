<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrivaan - Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <nav id="sidebar">
        <div class="sidebar-header">
            <h4 class="fw-bold m-0"><i class="fas fa-sprout me-2"></i>Agrivaan</h4>
        </div>
        <div class="mt-4">
            <a href="dashboard.html" class="sidebar-link"><i class="fas fa-tachometer-alt me-3"></i>Dashboard</a>
            <a href="farmers.html" class="sidebar-link"><i class="fas fa-users me-3"></i>Farmers List</a>
            <a href="questions.html" class="sidebar-link"><i class="fas fa-question-circle me-3"></i>Survey Questions</a>
            <a href="analytics.html" class="sidebar-link"><i class="fas fa-chart-pie me-3"></i>Analytics</a>
            <a href="settings.html" class="sidebar-link active"><i class="fas fa-cog me-3"></i>Settings</a>
        </div>
    </nav>

    <div id="content">
        <h2 class="fw-bold mb-4">Settings</h2>

        <div class="row">
            <div class="col-md-6">
                <div class="glass-card p-4">
                    <h5 class="fw-bold mb-4">Account Profile</h5>
                    <form id="profileForm">
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" id="adminEmail" class="form-control" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Change Password</label>
                            <input type="password" class="form-control" placeholder="New Password">
                        </div>
                        <button type="submit" class="btn btn-primary-agri">Update Profile</button>
                    </form>
                </div>
            </div>
            <div class="col-md-6">
                <div class="glass-card p-4">
                    <h5 class="fw-bold mb-4">System Info</h5>
                    <p><b>Version:</b> 1.0.0 (Production Ready)</p>
                    <p><b>Database:</b> MySQL (Connected)</p>
                    <p><b>Last Backup:</b> Never</p>
                    <hr>
                    <button class="btn btn-outline-danger">Purge Audit Logs</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('adminEmail').value = localStorage.getItem('admin_email');
        });
    </script>
</body>
</html>
